<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CAPA Session Planning Poll</title>

<style>
body{
font-family:Arial,Helvetica,sans-serif;
background:#f5f7fb;
margin:0;
padding:40px;
color:#17324d
}

.container{
max-width:1100px;
margin:auto
}

h1{
text-align:center;
margin-bottom:20px
}

.stats{
display:flex;
gap:20px;
justify-content:center;
margin-bottom:30px
}

.stat{
background:white;
padding:15px 25px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
text-align:center
}

.grid{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:15px
}

.card{
background:white;
padding:20px;
border-radius:14px;
box-shadow:0 4px 12px rgba(0,0,0,.08)
}

button{
margin-top:10px;
padding:10px;
border:none;
border-radius:10px;
background:#2d6298;
color:white;
cursor:pointer
}

button:disabled{
background:#ccc
}

.admin{
margin-top:40px;
padding:20px;
background:white;
border-radius:12px;
box-shadow:0 4px 12px rgba(0,0,0,.08)
}
</style>
</head>

<body>

<div class="container">

<h1>CAPA Research & Scholarship Committee<br>Session Planning Poll</h1>

<div class="stats">
<div class="stat">
<div id="total">5</div>
<div>Sessions</div>
</div>

<div class="stat">
<div id="claimed">0</div>
<div>Claimed</div>
</div>

<div class="stat">
<div id="remaining">5</div>
<div>Remaining</div>
</div>
</div>

<div class="grid" id="grid"></div>

<div class="admin">
<h3>Admin Reset</h3>

<input id="adminName" placeholder="Admin name"><br><br>
<input id="adminPassword" placeholder="Admin password" type="password"><br><br>

<button onclick="resetAll()">Reset all claims</button>
</div>

</div>

<script>

const API_URL="https://script.google.com/macros/s/AKfycbzpTYLRNB1CA2ghzUkFvWN6MlW08-0zXJdDCdka6ouS385kq_SLV5cc_6MPPxTJMSKC/exec"

const sessions=[
{ id:"Q1",time:"Sep–Dec 2026",topic:"Identifying publishable cases and developing impactful case reports"},
{ id:"Q2",time:"Jan–Mar 2027",topic:"IRB and regulatory considerations for clinical research"},
{ id:"Q3",time:"Apr–Jun 2027",topic:"Developing a publishable pathology manuscript"},
{ id:"Q4",time:"Jul–Sep 2027",topic:"Designing high-quality case series in pathology research"},
{ id:"Q5",time:"Oct–Dec 2027",topic:"Roundtable discussion"}
]

const grid=document.getElementById("grid")

async function load(){

const res=await fetch(API_URL+"?action=list")
const data=await res.json()

const claims=data.claims||[]

grid.innerHTML=""

sessions.forEach(s=>{

const claim=claims.find(c=>c.session_id===s.id)

const div=document.createElement("div")
div.className="card"

div.innerHTML=`
<b>${s.id}</b><br>
${s.time}<br><br>
${s.topic}<br><br>
${claim?`Claimed by <b>${claim.user_name}</b>`:`Available`}
<br>
<button ${claim?"disabled":""} onclick="claim('${s.id}')">
${claim?"Claimed":"Claim"}
</button>
`

grid.appendChild(div)

})

document.getElementById("claimed").innerText=claims.length
document.getElementById("remaining").innerText=sessions.length-claims.length

}

async function claim(id){

const name=prompt("Enter your name")

if(!name)return

await fetch(API_URL,{
method:"POST",
body:JSON.stringify({
action:"claim",
session_id:id,
user_name:name
})
})

load()

}

async function resetAll(){

const name=document.getElementById("adminName").value
const pwd=document.getElementById("adminPassword").value

await fetch(API_URL,{
method:"POST",
body:JSON.stringify({
action:"reset",
admin_name:name,
password:pwd
})
})

load()

}

load()

setInterval(load,5000)

</script>

</body>
</html>
